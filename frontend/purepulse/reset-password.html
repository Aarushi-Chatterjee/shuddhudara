<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurePulse | New Identity Protocol</title>
    <link rel="stylesheet" href="purepulse.css">
    <style>
        .login-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--pp-bg);
            position: relative;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3.5rem;
            z-index: 10;
        }

        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.75rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--pp-text-secondary);
        }

        .pp-error,
        .pp-success {
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }

        .pp-error {
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        .pp-success {
            background: rgba(0, 255, 148, 0.1);
            color: var(--pp-green);
            border: 1px solid rgba(0, 255, 148, 0.2);
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <div class="login-wrapper">
        <div class="login-card pp-glass">
            <div class="login-header">
                <h1 class="pp-title" style="font-size: 2rem;">New Protocol</h1>
                <p style="font-size: 0.85rem; color: var(--pp-text-secondary); margin-top: 1rem;">Set your new Security Protocol (Password)</p>
            </div>

            <div id="errorMessage" class="pp-error"></div>
            <div id="successMessage" class="pp-success"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label">New Protocol (Password)</label>
                    <input type="password" id="newPassword" class="pp-input" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Verify New Protocol</label>
                    <input type="password" id="confirmPassword" class="pp-input" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" id="resetBtn" class="pp-button" style="width: 100%;">Update Identity</button>
            </form>

            <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; display: none;" id="returnLink">
                <a href="login.html" style="color: var(--pp-green); text-decoration: none; font-weight: bold;">Initialize Session</a>
            </div>
            
            <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem;" id="loginLink">
                <a href="login.html" style="color: var(--pp-text-secondary); text-decoration: none;">Return to Nexus</a>
            </div>
        </div>
    </div>

    <script>
        // Theme Persistence Layer
        const currentTheme = localStorage.getItem('pp-theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('errorMessage').innerText = "Invalid or missing recovery token.";
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('resetBtn').disabled = true;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const resetBtn = document.getElementById('resetBtn');

            if (newPassword !== confirmPassword) {
                errorDiv.innerText = 'Protocols do not match.';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerText = 'Updating...';

            try {
                const response = await fetch(`/api/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newPassword })
                });

                const data = await response.json();

                if (data.success) {
                    successDiv.innerText = data.message;
                    successDiv.style.display = 'block';
                    errorDiv.style.display = 'none';
                    
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('returnLink').style.display = 'block';
                    document.getElementById('loginLink').style.display = 'none';
                } else {
                    errorDiv.innerText = data.message || 'Update failed';
                    errorDiv.style.display = 'block';
                    successDiv.style.display = 'none';
                    resetBtn.disabled = false;
                    resetBtn.innerText = 'Update Identity';
                }
            } catch (error) {
                errorDiv.innerText = 'Nexus link disrupted.';
                errorDiv.style.display = 'block';
                resetBtn.disabled = false;
                resetBtn.innerText = 'Update Identity';
            }
        });
    </script>
</body>

</html>
